<!DOCTYPE html>
<html>
<head>
  <title>Visitor Schedule</title>
  <meta http-equiv="refresh" content="60">
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    h1 {
      text-align: center;
      font-size: 90px;
      margin: 10px 0;
    }

    .today-bar {
      text-align: center;
      font-size: 50px;
      background: #ffeb3b;
      color: black;
      padding: 10px;
      font-weight: bold;
    }

    .container {
      width: 100%;
      height: 80vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    iframe {
      width: 180%;
      height: 140%;
      border: none;
      transform: scale(1.6);
      transform-origin: top center;
    }
  </style>
</head>
<body>
  <h1>Visitor Schedule</h1>

  <div class="today-bar" id="today"></div>

  <div class="container">
    <iframe src="https://outlook.office365.com/owa/calendar/4c3e24c3b9fc418fbd1d0d8f4d4fc2f5@citywideps.com/c61aaadeb7104b6ab7b18f7cb0e4d78f6342506111589640934/calendar.html"></iframe>
  </div>

  <script>
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById("today").innerText =
      "TODAY: " + new Date().toLocaleDateString(undefined, options);
  </script>
</body>
</html>
